<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="내 주식">
<meta name="mobile-web-app-capable" content="yes">
<title>내 주식 트리맵</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header class="header">
    <h1>내 주식</h1>
    <button class="refresh-btn" id="refresh-btn" aria-label="새로고침">↻</button>
  </header>

  <div class="settings-row" id="settings-row">
    <input id="api-url-input" type="text" placeholder="https://kis-proxy.xxx.workers.dev" autocomplete="off" />
    <button id="save-api-btn">저장</button>
  </div>

  <div class="input-row">
    <input id="ticker-input" type="text" inputmode="numeric" placeholder="종목코드 6자리" maxlength="6" autocomplete="off" />
    <input id="name-input" type="text" placeholder="이름 (선택)" autocomplete="off" />
    <button id="add-btn">+ 추가</button>
  </div>

  <div class="status" id="status"></div>
  <div class="treemap" id="treemap"></div>

  <p class="hint">한국식 색상: 빨강↑ 상승, 파랑↓ 하락 · 종목을 누르면 차트와 뉴스를 볼 수 있어요</p>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="install-prompt" id="install-prompt">
  <span>홈화면에 추가하면 앱처럼 사용할 수 있어요</span>
  <div>
    <button id="install-btn">설치</button>
    <button class="close-x" id="install-close" aria-label="닫기">×</button>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Service Worker 등록 (오프라인/PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
